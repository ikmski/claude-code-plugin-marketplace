<!-- @dsCard group="Colors" viewport="700x150" name="Status & tints" subtitle="Semantic status colors over tinted fills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 18px; }
  .row { display: flex; gap: 10px; }
  .item { flex: 1; border-radius: var(--radius-sm); padding: 12px; border-left: 3px solid; font-family: var(--font-mono); }
  .t { font-size: 12px; font-weight: 600; }
  .h { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="background:var(--success-tint);border-color:var(--success)"><div class="t" style="color:var(--success)">success</div><div class="h">green · tests pass</div></div>
    <div class="item" style="background:var(--warning-tint);border-color:var(--warning)"><div class="t" style="color:var(--warning)">warning</div><div class="h">yellow · caution</div></div>
    <div class="item" style="background:var(--danger-tint);border-color:var(--danger)"><div class="t" style="color:var(--danger)">danger</div><div class="h">red · failure</div></div>
    <div class="item" style="background:var(--info-tint);border-color:var(--info)"><div class="t" style="color:var(--info)">info</div><div class="h">cyan · note</div></div>
    <div class="item" style="background:var(--accent-tint);border-color:var(--accent)"><div class="t" style="color:var(--accent)">accent</div><div class="h">blue · primary</div></div>
  </div>
</body>
</html>
