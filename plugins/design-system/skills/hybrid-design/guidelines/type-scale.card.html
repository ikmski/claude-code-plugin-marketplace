<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 16px 20px; }
  .row { display: flex; align-items: baseline; gap: 14px; font-family: var(--font-mono); border-bottom: 1px solid var(--border-subtle); padding: 4px 0; }
  .tok { width: 90px; flex: 0 0 auto; font-size: 10px; color: var(--text-muted); }
  .ex { color: var(--text-bright); white-space: nowrap; overflow: hidden; }
</style>
</head>
<body>
  <div class="row"><span class="tok">5xl · 60</span><span class="ex" style="font-size:34px">Aa Build</span></div>
  <div class="row"><span class="tok">3xl · 36</span><span class="ex" style="font-size:26px">Aa Compile fast</span></div>
  <div class="row"><span class="tok">xl · 22</span><span class="ex" style="font-size:20px">Aa The quick brown fox</span></div>
  <div class="row" style="border:none"><span class="tok">base · 14</span><span class="ex" style="font-size:14px">Aa The quick brown fox jumps over the lazy dog</span></div>
</body>
</html>
