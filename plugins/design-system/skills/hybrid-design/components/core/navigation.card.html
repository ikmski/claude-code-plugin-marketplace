<!-- @dsCard group="Components" viewport="700x230" name="Tabs, Tooltip & Avatar" subtitle="Navigation, hints, identity" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 22px; }
  .stack { display: flex; flex-direction: column; gap: 20px; max-width: 560px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); width: 64px; flex: 0 0 auto; }
  .panel { font-family: var(--font-sans); font-size: 13px; color: var(--text-secondary); padding-top: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs, Tooltip, Avatar, Button } = window.HybridDesignSystem_e4e0e4;
  const COPY = { changes: '3 files changed, 128 insertions(+), 14 deletions(−)', history: '47 commits on this branch.', blame: '' };
  function Demo() {
    const [tab, setTab] = React.useState('changes');
    return (
      <div className="stack">
        <div>
          <Tabs value={tab} onChange={setTab} tabs={[
            { value: 'changes', label: 'Changes', badge: 3 },
            { value: 'history', label: 'History' },
            { value: 'blame', label: 'Blame', disabled: true },
          ]} />
          <div className="panel">{COPY[tab]}</div>
        </div>
        <div className="row">
          <span className="lbl">Tooltip</span>
          <Tooltip content="git pull --rebase" side="top"><Button variant="secondary" size="sm">Sync</Button></Tooltip>
          <Tooltip content="Stage all changes" side="right"><Button variant="ghost" size="sm">Stage all</Button></Tooltip>
        </div>
        <div className="row">
          <span className="lbl">Avatar</span>
          <Avatar name="Ada Lovelace" status="online" />
          <Avatar name="Grace Hopper" status="busy" />
          <Avatar name="Linus T" status="away" round />
          <Avatar name="CI Bot" size={40} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
