<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 22px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); width: 64px; flex: 0 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Badge } = window.HybridDesignSystem_e4e0e4;
  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Variant</span>
          <Button variant="solid">Commit</Button>
          <Button variant="secondary">Stage</Button>
          <Button variant="ghost">Discard</Button>
          <Button variant="success">Merge</Button>
          <Button variant="danger">Revert</Button>
          <Button variant="solid" disabled>Disabled</Button>
        </div>
        <div className="row">
          <span className="lbl">Size</span>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
        </div>
        <div className="row">
          <span className="lbl">Badge</span>
          <Badge tone="green" dot>passing</Badge>
          <Badge tone="red" dot>failed</Badge>
          <Badge tone="yellow">deprecated</Badge>
          <Badge tone="blue">v2.4.1</Badge>
          <Badge tone="purple">async</Badge>
          <Badge tone="cyan">regex</Badge>
          <Badge>neutral</Badge>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
