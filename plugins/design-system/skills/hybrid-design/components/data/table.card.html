<!-- @dsCard group="Data" viewport="700x240" name="Table" subtitle="Dense data grid with status cells" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-canvas); padding: 22px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Table, Badge } = window.HybridDesignSystem_e4e0e4;
  function Demo() {
    return (
      <Table
        columns={[
          { key: 'job', label: 'Job' },
          { key: 'branch', label: 'Branch' },
          { key: 'status', label: 'Status', render: (v) => (
            <Badge tone={v==='passed'?'green':v==='running'?'blue':'red'} dot>{v}</Badge>
          )},
          { key: 'duration', label: 'Duration', align: 'right' },
        ]}
        rows={[
          { job: 'build',   branch: 'main',         status: 'passed',  duration: '41s' },
          { job: 'test',    branch: 'main',         status: 'passed',  duration: '1m12s' },
          { job: 'lint',    branch: 'feature/auth', status: 'running', duration: '—' },
          { job: 'deploy',  branch: 'release/2.4',  status: 'failed',  duration: '8s' },
        ]}
      />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
